<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">
  <title id="title">Cloud band placeholder</title>
  <desc id="desc">Abstract atmospheric cloud bands over a blue-green background.</desc>
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#d8eef4" />
      <stop offset="0.48" stop-color="#7fb3c2" />
      <stop offset="1" stop-color="#0d5060" />
    </linearGradient>
    <filter id="blur">
