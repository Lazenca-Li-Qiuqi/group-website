    <ellipse cx="620" cy="332" rx="410" ry="102" />
    <ellipse cx="980" cy="470" rx="360" ry="96" />
  </g>
  <g fill="none" stroke="#ffffff" stroke-opacity="0.28" stroke-width="2">
