name: Deploy static site

on:
  push:
    branches:
      - main
    paths:
      - "site/**"
      - ".github/workflows/deploy.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate static site
        run: |
          test -f site/index.html
          test -f site/research.html
          test -f site/publications.html
          test -f site/cv.html
          test -f site/people.html
          test -f site/photos.html
          test -f site/styles.css
          test -f site/.nojekyll

      - name: Deploy
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: site
          clean: true
