name: Static site formatting

on:
  pull_request:
    branches:
      - main
    paths:
      - "site/**"
      - ".github/workflows/prettier.yml"
  push:
    branches:
      - main
    paths:
      - "site/**"
      - ".github/workflows/prettier.yml"
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4

      - name: Check formatting
        run: npx --yes prettier site --check
